# =============================================================================
# UDSM Student Support AI — Docker Compose
#
# Start:       docker compose up -d
# Stop:        docker compose down
# Logs:        docker compose logs -f
# Rebuild:     docker compose up -d --build
# Reset data:  docker compose down -v   (⚠ deletes all volumes)
# =============================================================================

services:

  # ── Ollama LLM Server ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-llm
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: "4"

  # ── Pull the model on first startup ────────────────────────────────────────
  # This one-shot service ensures the model is available before the backend starts.
  # MODEL_NAME must match the value set on the backend service below.
  ollama-setup:
    image: ollama/ollama:latest
    container_name: ollama-setup
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      echo "Pulling qwen2.5:3b model..." &&
      ollama pull qwen2.5:3b &&
      echo "Model ready."

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: udsm-llm-backend
    restart: unless-stopped
    depends_on:
      ollama-setup:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_API_URL=http://ollama:11434/api/generate
      # Must match the model pulled by ollama-setup above
      - MODEL_NAME=qwen2.5:3b
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      # Persist application logs across restarts
      - ./backend/logs:/app/backend/logs
      # Persist ChromaDB vector index — avoids re-indexing on every restart
      - vector_store_data:/app/backend/vector_store
      # Persist HuggingFace model cache — avoids re-downloading the 80 MB model
      - hf_cache:/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 15s
      retries: 5
      # Allow time for embedding model download + ChromaDB index build on first run
      start_period: 120s

volumes:
  # Ollama model weights
  ollama_data:
    driver: local
  # ChromaDB persistent vector index
  vector_store_data:
    driver: local
  # sentence-transformers / HuggingFace model cache
  hf_cache:
    driver: local
