# =============================================================================
# UDSM Student Support AI — Docker Compose (Production)
#
# Start:       docker compose up -d
# Stop:        docker compose down
# Logs:        docker compose logs -f
# Rebuild:     docker compose up -d --build
# Reset data:  docker compose down -v   (⚠ deletes all volumes)
#
# For local development with hot-reload, use:
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up
# =============================================================================

services:



  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: udsm-postgres
    restart: unless-stopped
    networks:
      - udsm_net
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=2018
      - POSTGRES_DB=udsm_ai
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d udsm_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: udsm-llm-backend
    restart: unless-stopped
    networks:
      - udsm_net
    depends_on:
      db:
        condition: service_healthy
    # Backend is only directly accessible via Nginx in production.
    # Uncomment below to expose port 8000 directly (e.g. for debugging).
    # ports:
    #   - "8000:8000"
    env_file:
      - path: .env
        required: false     # allows startup without a .env (uses built-in defaults)
    environment:
      - OLLAMA_API_URL=http://host.docker.internal:11434/api/generate
      - MODEL_NAME=${MODEL_NAME:-qwen2.5:3b}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DATABASE_URL=postgresql+asyncpg://postgres:2018@db:5432/udsm_ai
    volumes:
      # Persist application logs across restarts
      - ./backend/logs:/app/backend/logs
      # Persist ChromaDB vector index — avoids re-indexing on every restart
      - vector_store_data:/app/backend/vector_store
      # Persist HuggingFace model cache — avoids re-downloading the embedding model
      - hf_cache:/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 15s
      retries: 5
      # Allow time for embedding model download + ChromaDB index build on first run
      start_period: 120s

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  # Single entry point on port 80:
  #   /        → serves frontend/index.html and static assets
  #   /api/    → proxies to FastAPI backend (strips /api prefix)
  #   /health  → proxies to FastAPI health check
  #   /docs    → proxies to FastAPI Swagger UI
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: udsm-frontend
    restart: unless-stopped
    networks:
      - udsm_net
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:

  # ChromaDB persistent vector index
  vector_store_data:
    driver: local
  # sentence-transformers / HuggingFace model cache
  hf_cache:
    driver: local
  # PostgreSQL database volume
  pg_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  udsm_net:
    driver: bridge
    name: udsm_network
