# =============================================================================
# Nginx — UDSM Student Support AI Reverse Proxy
#
# Routing:
#   /           → static frontend files (index.html, assets)
#   /api/*      → FastAPI backend (prefix stripped before proxying)
#   /health     → FastAPI health endpoint (direct proxy, no prefix strip)
#   /docs       → FastAPI Swagger UI
#   /openapi.json → FastAPI OpenAPI schema
# =============================================================================

upstream backend {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Frontend static files ─────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Serve static files; fall back to index.html for SPA routing
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy — strip /api prefix before forwarding ───────────────────────
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # Timeouts — generous because first query may warm up the LLM
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    # ── Direct FastAPI routes (no prefix stripping needed) ────────────────────
    location ~ ^/(health|docs|redoc|openapi\.json|ask|feedback|static|auth|chat) {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    # ── Deny hidden files ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
